<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aasik ABM — Software Engineer & Full Stack Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
:root {
  --bg:#020408;--bg2:#060c14;--bg3:#0a1628;
  --blue:#0ea5e9;--cyan:#06b6d4;--purple:#a855f7;
  --pink:#ec4899;--green:#10b981;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --glass:rgba(14,165,233,0.05);--glass2:rgba(168,85,247,0.08);
  --border:rgba(14,165,233,0.15);--border2:rgba(168,85,247,0.2);
  --glow-blue:0 0 30px rgba(14,165,233,0.4);
  --glow-purple:0 0 30px rgba(168,85,247,0.4);
  --font:'Sora',sans-serif;--mono:'Space Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden;cursor:none}

/* CURSOR */
.cursor{width:12px;height:12px;background:var(--cyan);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transition:transform 0.1s ease;mix-blend-mode:screen}
.cursor-follower{width:36px;height:36px;border:1px solid rgba(14,165,233,0.5);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transition:transform 0.15s ease,width 0.3s,height 0.3s}

/* SCROLL PROGRESS */
#scroll-progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--purple),var(--pink));z-index:1001;width:0%;transition:width 0.1s ease;box-shadow:0 0 10px rgba(14,165,233,0.6)}

/* PAGE TRANSITION OVERLAY */
.page-transition{position:fixed;inset:0;z-index:9000;pointer-events:none;display:flex;align-items:center;justify-content:center}
.pt-panel{position:absolute;width:100%;height:100%;background:linear-gradient(135deg,var(--bg3),#0a0f1e)}
.pt-panel-1{transform:translateY(-100%);transition:transform 0.5s cubic-bezier(0.77,0,0.175,1)}
.pt-panel-2{transform:translateY(-100%);transition:transform 0.5s cubic-bezier(0.77,0,0.175,1) 0.1s;background:linear-gradient(135deg,rgba(14,165,233,0.15),rgba(168,85,247,0.1))}
.pt-logo{font-family:var(--mono);font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0;transform:scale(0.8);transition:opacity 0.3s ease 0.3s,transform 0.3s ease 0.3s;z-index:1;position:relative}
.page-transition.entering .pt-panel-1{transform:translateY(0)}
.page-transition.entering .pt-panel-2{transform:translateY(0)}
.page-transition.entering .pt-logo{opacity:1;transform:scale(1)}
.page-transition.exiting .pt-panel-1{transform:translateY(100%);transition:transform 0.5s cubic-bezier(0.77,0,0.175,1) 0.2s}
.page-transition.exiting .pt-panel-2{transform:translateY(100%);transition:transform 0.5s cubic-bezier(0.77,0,0.175,1) 0.1s}
.page-transition.exiting .pt-logo{opacity:0}

/* PRELOADER */
#preloader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10000;flex-direction:column;gap:20px;transition:opacity 0.6s ease,visibility 0.6s}
#preloader.hide{opacity:0;visibility:hidden}
.loader-ring{width:80px;height:80px;border:3px solid transparent;border-top-color:var(--blue);border-right-color:var(--purple);border-radius:50%;animation:spin 1s linear infinite}
.loader-name{font-family:var(--mono);font-size:14px;color:var(--cyan);letter-spacing:4px;animation:pulse-text 1s ease infinite alternate}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-text{from{opacity:0.4}to{opacity:1}}

/* NOISE */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:1;opacity:0.4}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(14,165,233,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}

/* NAVBAR */
nav{position:fixed;top:0;left:0;right:0;z-index:500;padding:0 5%;height:70px;display:flex;align-items:center;justify-content:space-between;background:rgba(2,4,8,0.7);backdrop-filter:blur(20px);border-bottom:1px solid rgba(14,165,233,0.1);transition:all 0.3s ease}
nav.scrolled{box-shadow:0 0 40px rgba(14,165,233,0.1)}
.nav-logo{font-family:var(--mono);font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--purple));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px;cursor:pointer}
.nav-logo span{-webkit-text-fill-color:var(--cyan)}
.nav-links{display:flex;gap:8px;align-items:center;list-style:none}
.nav-links a{color:var(--text2);text-decoration:none;font-size:13px;padding:6px 12px;border-radius:6px;transition:all 0.3s ease;position:relative;letter-spacing:0.5px;cursor:pointer}
.nav-links a::after{content:'';position:absolute;bottom:2px;left:12px;right:12px;height:1px;background:linear-gradient(90deg,var(--blue),var(--purple));transform:scaleX(0);transition:transform 0.3s ease}
.nav-links a:hover{color:var(--text)}
.nav-links a:hover::after{transform:scaleX(1)}
.nav-links a.active{color:var(--cyan)}
.nav-right{display:flex;gap:12px;align-items:center}
.theme-toggle{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--glass);color:var(--cyan);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.3s ease}
.theme-toggle:hover{border-color:var(--cyan);box-shadow:var(--glow-blue)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px}
.hamburger span{width:24px;height:2px;background:var(--cyan);border-radius:2px;transition:all 0.3s ease}
.mobile-menu{display:none;position:fixed;top:70px;left:0;right:0;background:rgba(6,12,20,0.98);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:20px 5%;z-index:499;flex-direction:column;gap:4px}
.mobile-menu.open{display:flex}
.mobile-menu a{color:var(--text2);text-decoration:none;padding:12px 16px;border-radius:8px;font-size:14px;transition:all 0.3s ease;border:1px solid transparent;cursor:pointer}
.mobile-menu a:hover{color:var(--cyan);border-color:var(--border);background:var(--glass)}

/* SECTIONS */
section{position:relative;z-index:2}
.section-container{max-width:1200px;margin:0 auto;padding:0 5%}
.section-title{text-align:center;margin-bottom:60px}
.section-title .label{font-family:var(--mono);font-size:12px;color:var(--cyan);letter-spacing:4px;text-transform:uppercase;margin-bottom:12px;display:block}
.section-title h2{font-size:clamp(28px,4vw,48px);font-weight:800;background:linear-gradient(135deg,var(--text),var(--text2));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
.section-title h2 .highlight{background:linear-gradient(135deg,var(--blue),var(--purple));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title-line{width:80px;height:3px;margin:0 auto;background:linear-gradient(90deg,var(--blue),var(--purple),var(--pink));border-radius:2px;box-shadow:0 0 15px rgba(14,165,233,0.5)}

/* HERO */
#home{min-height:100vh;display:flex;align-items:center;padding:100px 5% 60px;position:relative;overflow:hidden}
.hero-glow-1{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(14,165,233,0.12) 0%,transparent 70%);top:-100px;left:-200px;pointer-events:none;animation:float-glow 8s ease-in-out infinite}
.hero-glow-2{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(168,85,247,0.1) 0%,transparent 70%);bottom:-100px;right:-100px;pointer-events:none;animation:float-glow 10s ease-in-out infinite reverse}
@keyframes float-glow{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,30px) scale(1.1)}}
.hero-inner{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;max-width:1200px;margin:0 auto;width:100%}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(14,165,233,0.1);border:1px solid rgba(14,165,233,0.3);padding:6px 14px;border-radius:50px;font-size:12px;color:var(--cyan);letter-spacing:1px;margin-bottom:20px;animation:badge-glow 2s ease infinite alternate}
@keyframes badge-glow{from{box-shadow:0 0 10px rgba(14,165,233,0.2)}to{box-shadow:0 0 25px rgba(14,165,233,0.5)}}
.hero-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:dot-blink 1.5s ease infinite;box-shadow:0 0 6px var(--green)}
@keyframes dot-blink{0%,100%{opacity:1}50%{opacity:0.3}}
.hero-name{font-size:clamp(40px,6vw,76px);font-weight:800;line-height:1.05;margin-bottom:12px;background:linear-gradient(135deg,#fff 0%,#cbd5e1 60%,var(--blue) 100%);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-2px}
.hero-role{font-size:clamp(18px,2.5vw,26px);font-weight:600;margin-bottom:20px;height:40px;overflow:hidden}
.hero-role .typed-text{background:linear-gradient(135deg,var(--blue),var(--purple),var(--pink));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-role .cursor-blink{color:var(--cyan);-webkit-text-fill-color:var(--cyan);animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.hero-desc{color:var(--text2);line-height:1.8;font-size:15px;margin-bottom:36px;max-width:500px}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:48px}
.btn-primary{padding:13px 28px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-weight:600;font-size:14px;text-decoration:none;border:none;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.3s ease,box-shadow 0.3s ease;display:inline-flex;align-items:center;gap:8px;letter-spacing:0.5px;font-family:var(--font)}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);transform:translateX(-100%);transition:transform 0.4s ease}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(14,165,233,0.4)}
.btn-primary:hover::before{transform:translateX(100%)}
.btn-secondary{padding:12px 28px;border-radius:10px;border:1px solid var(--border2);background:var(--glass2);color:var(--text);font-weight:600;font-size:14px;text-decoration:none;cursor:pointer;transition:all 0.3s ease;display:inline-flex;align-items:center;gap:8px;letter-spacing:0.5px;backdrop-filter:blur(10px);font-family:var(--font)}
.btn-secondary:hover{border-color:var(--purple);box-shadow:0 0 20px rgba(168,85,247,0.3);color:var(--purple);transform:translateY(-2px)}
.btn-outline{padding:12px 28px;border-radius:10px;border:1px solid rgba(16,185,129,0.3);background:rgba(16,185,129,0.06);color:var(--green);font-weight:600;font-size:14px;text-decoration:none;cursor:pointer;transition:all 0.3s ease;display:inline-flex;align-items:center;gap:8px;letter-spacing:0.5px;font-family:var(--font)}
.btn-outline:hover{border-color:var(--green);box-shadow:0 0 20px rgba(16,185,129,0.3);transform:translateY(-2px)}
.hero-stats{display:flex;gap:32px}
.hero-stat{text-align:center}
.hero-stat .num{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--cyan));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:var(--mono)}
.hero-stat .lbl{font-size:12px;color:var(--text3);margin-top:2px}
.hero-visual{display:flex;align-items:center;justify-content:center;position:relative}
.hero-img-ring{width:340px;height:340px;border-radius:50%;position:relative;flex-shrink:0}
.hero-img-ring::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(var(--blue),var(--purple),var(--pink),var(--cyan),var(--blue));animation:spin 4s linear infinite}
.hero-img-ring::after{content:'';position:absolute;inset:-12px;border-radius:50%;border:1px solid rgba(14,165,233,0.2);animation:spin 8s linear infinite reverse}
.hero-avatar{width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,var(--bg3),#0f1f3d);display:flex;align-items:center;justify-content:center;position:relative;z-index:1;border:4px solid var(--bg)}
.hero-img{width:120%;height:130%;object-fit:cover;border-radius:50%;transform:translateY(-37px)}
.float-icon{position:absolute;width:52px;height:52px;background:rgba(14,165,233,0.1);border:1px solid rgba(14,165,233,0.3);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--cyan);backdrop-filter:blur(10px);animation:float-icon 4s ease-in-out infinite}
@keyframes float-icon{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-10px) rotate(5deg)}}
.scroll-hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text3);font-size:11px;letter-spacing:2px;animation:scroll-anim 2s ease-in-out infinite}
.scroll-hint .arrow{font-size:18px;color:var(--cyan)}
@keyframes scroll-anim{0%,100%{opacity:1;transform:translateX(-50%) translateY(0)}50%{opacity:0.5;transform:translateX(-50%) translateY(6px)}}

/* ABOUT */
#about{padding:100px 0}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:70px;align-items:center}
.about-card-main{background:linear-gradient(135deg,var(--bg3),rgba(14,165,233,0.05));border:1px solid var(--border);border-radius:24px;padding:40px;position:relative;overflow:hidden}
.about-card-main::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(14,165,233,0.1),transparent);border-radius:50%}
.code-block{font-family:var(--mono);font-size:13px;line-height:1.9;color:var(--text2)}
.code-block .kw{color:var(--purple)}
.code-block .fn{color:var(--blue)}
.code-block .str{color:var(--green)}
.code-block .num{color:var(--pink)}
.code-block .cm{color:var(--text3)}
.about-badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px}
.badge{padding:5px 12px;border-radius:50px;font-size:11px;font-weight:700;letter-spacing:0.5px}
.badge-blue{background:rgba(14,165,233,0.1);color:var(--blue);border:1px solid rgba(14,165,233,0.3)}
.badge-purple{background:rgba(168,85,247,0.1);color:var(--purple);border:1px solid rgba(168,85,247,0.3)}
.badge-cyan{background:rgba(6,182,212,0.1);color:var(--cyan);border:1px solid rgba(6,182,212,0.3)}
.badge-green{background:rgba(16,185,129,0.1);color:var(--green);border:1px solid rgba(16,185,129,0.3)}
.badge-pink{background:rgba(236,72,153,0.1);color:var(--pink);border:1px solid rgba(236,72,153,0.3)}
.about-floating-cards{position:absolute;bottom:-20px;right:-20px;display:flex;flex-direction:column;gap:10px}
.mini-card{background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.25);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:600;backdrop-filter:blur(10px);animation:float-icon 3s ease-in-out infinite}
.mini-card i{color:var(--purple);font-size:16px}
.about-visual{position:relative}
.about-text h3{font-size:clamp(20px,2.5vw,28px);font-weight:800;margin-bottom:20px;background:linear-gradient(135deg,var(--text),var(--blue));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.about-text p{color:var(--text2);line-height:1.8;font-size:15px;margin-bottom:16px}
.about-text p span{color:var(--cyan);font-weight:600}
.about-detail-list{list-style:none;margin:24px 0}
.about-detail-list li{display:flex;align-items:center;gap:12px;color:var(--text2);font-size:14px;padding:8px 0;border-bottom:1px solid rgba(14,165,233,0.07)}
.about-detail-list li i{color:var(--blue);font-size:14px;width:18px}

/* SKILLS */
#skills{padding:100px 0}
.marquee-wrap{overflow:hidden;margin:40px 0;mask-image:linear-gradient(90deg,transparent,black 10%,black 90%,transparent)}
.marquee-track{display:flex;gap:12px;width:max-content;animation:marquee 25s linear infinite}
.marquee-track:hover{animation-play-state:paused}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.marquee-item{padding:10px 20px;border:1px solid var(--border);border-radius:50px;font-size:13px;color:var(--text2);white-space:nowrap;display:flex;align-items:center;gap:8px;background:var(--glass);backdrop-filter:blur(10px);transition:all 0.3s ease}
.marquee-item:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 15px rgba(14,165,233,0.2)}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.skill-cat{background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:28px;transition:all 0.4s ease}
.skill-cat:hover{border-color:rgba(14,165,233,0.4);box-shadow:0 20px 60px rgba(14,165,233,0.1);transform:translateY(-4px)}
.skill-cat-title{font-size:14px;font-weight:700;color:var(--cyan);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.skill-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.skill-tag{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.st-js{background:rgba(247,223,30,0.1);color:#f7df1e;border:1px solid rgba(247,223,30,0.2)}
.st-py{background:rgba(55,118,171,0.1);color:#4b9ce8;border:1px solid rgba(55,118,171,0.2)}
.st-cs{background:rgba(104,33,122,0.15);color:#a855f7;border:1px solid rgba(104,33,122,0.3)}
.st-java{background:rgba(248,152,32,0.1);color:#f89820;border:1px solid rgba(248,152,32,0.2)}
.st-php{background:rgba(119,123,180,0.15);color:#7b7fb4;border:1px solid rgba(119,123,180,0.25)}
.st-html{background:rgba(227,79,38,0.1);color:#e34f26;border:1px solid rgba(227,79,38,0.2)}
.st-css{background:rgba(21,114,182,0.1);color:#1572b6;border:1px solid rgba(21,114,182,0.2)}
.st-react{background:rgba(97,218,251,0.1);color:#61dafb;border:1px solid rgba(97,218,251,0.2)}
.st-node{background:rgba(83,158,78,0.1);color:#539e4e;border:1px solid rgba(83,158,78,0.2)}
.st-sql{background:rgba(0,118,182,0.1);color:#0076b6;border:1px solid rgba(0,118,182,0.2)}
.st-fig{background:rgba(162,89,255,0.1);color:#a259ff;border:1px solid rgba(162,89,255,0.2)}
.st-canva{background:rgba(0,196,204,0.1);color:#00c4cc;border:1px solid rgba(0,196,204,0.2)}
.skill-progress{display:flex;flex-direction:column;gap:10px}
.sp-row{display:flex;flex-direction:column;gap:5px}
.sp-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text3)}
.sp-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.sp-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:3px;width:0;transition:width 1.2s ease}
.sp-fill.anim{animation:none}

/* PROJECTS */
#projects{padding:100px 0}
.filter-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:50px}
.filter-btn{padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:var(--glass);color:var(--text2);font-size:13px;cursor:pointer;transition:all 0.3s ease;font-family:var(--font);font-weight:600}
.filter-btn.active,.filter-btn:hover{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border-color:transparent;box-shadow:0 5px 20px rgba(14,165,233,0.35)}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px}
.project-card{background:var(--glass);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:all 0.4s ease;position:relative}
.project-card:hover{transform:translateY(-8px) rotateX(2deg);border-color:rgba(14,165,233,0.4);box-shadow:0 30px 80px rgba(0,0,0,0.5),0 0 40px rgba(14,165,233,0.15)}
.project-img{height:200px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.project-real-img{position:absolute;width:100%;height:100%;object-fit:cover;z-index:1}
.project-img-bg{position:absolute;inset:0;background:rgba(0,0,0,0.5);z-index:2;transition:transform 0.4s ease}
.project-img-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:50px;color:#fff;z-index:3;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.project-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(0,0,0,0.7);opacity:0;transition:0.3s;z-index:4}
.project-card:hover .project-overlay{opacity:1}
.project-body{padding:24px}
.project-cat{font-family:var(--mono);font-size:10px;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.project-body h3{font-size:18px;font-weight:700;margin-bottom:10px;color:var(--text)}
.project-body p{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:16px}
.tech-stack{display:flex;flex-wrap:wrap;gap:6px}
.tech-tag{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;background:rgba(14,165,233,0.1);color:var(--blue);border:1px solid rgba(14,165,233,0.2)}

/* ACHIEVEMENTS */
#achievements{padding:100px 0}
.achievements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}
.achievement-card{background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:28px;transition:all 0.4s ease;position:relative;overflow:hidden;cursor:default}
.achievement-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(14,165,233,0.03),rgba(168,85,247,0.03));opacity:0;transition:opacity 0.3s ease}
.achievement-card:hover{transform:translateY(-6px);border-color:rgba(168,85,247,0.4);box-shadow:0 20px 60px rgba(168,85,247,0.15)}
.achievement-card:hover::before{opacity:1}
.achievement-card.featured{grid-column:span 2;background:linear-gradient(135deg,rgba(14,165,233,0.08),rgba(168,85,247,0.08));border-color:rgba(14,165,233,0.3)}
.ach-icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:18px}
.ach-icon-blue{background:rgba(14,165,233,0.12);color:var(--blue);border:1px solid rgba(14,165,233,0.25)}
.ach-icon-purple{background:rgba(168,85,247,0.12);color:var(--purple);border:1px solid rgba(168,85,247,0.25)}
.ach-icon-green{background:rgba(16,185,129,0.12);color:var(--green);border:1px solid rgba(16,185,129,0.25)}
.ach-badge{display:inline-block;padding:3px 10px;border-radius:50px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;margin-right:4px}
.ab-gold{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)}
.ab-blue{background:rgba(14,165,233,0.12);color:var(--blue);border:1px solid rgba(14,165,233,0.25)}
.ab-purple{background:rgba(168,85,247,0.12);color:var(--purple);border:1px solid rgba(168,85,247,0.25)}
.achievement-card h3{font-size:17px;font-weight:700;margin-bottom:8px}
.achievement-card p{font-size:13px;color:var(--text2);line-height:1.7}
.ach-year{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:14px}
.ach-logo{width:28px;height:28px;object-fit:contain}

/* CERTIFICATES */
#certificates{padding:100px 0}
.certs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.cert-card{background:var(--glass);border:1px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;transition:all 0.4s ease;position:relative}
.cert-card:hover{transform:translateY(-6px) scale(1.01);border-color:rgba(14,165,233,0.5);box-shadow:0 20px 60px rgba(14,165,233,0.2)}
.cert-img{height:180px;background:linear-gradient(135deg,var(--bg3),#0f1f3d);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.cert-img i{font-size:64px;opacity:0.9}
.cert-img::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,var(--bg) 100%)}
.cert-body{padding:20px}
.cert-body h4{font-size:15px;font-weight:700;margin-bottom:6px}
.cert-body .issuer{font-size:12px;color:var(--cyan);font-weight:600;margin-bottom:4px}
.cert-body .year{font-family:var(--mono);font-size:11px;color:var(--text3)}
.cert-hover-badge{position:absolute;top:12px;right:12px;background:rgba(14,165,233,0.15);border:1px solid rgba(14,165,233,0.3);border-radius:50px;padding:4px 10px;font-size:10px;color:var(--cyan);font-weight:700;opacity:0;transform:translateY(-4px);transition:all 0.3s ease}
.cert-card:hover .cert-hover-badge{opacity:1;transform:translateY(0)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(15px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;transition:all 0.4s ease}
.modal-overlay.open{opacity:1;visibility:visible}
.modal-overlay.open .modal-content{transform:translateY(0) scale(1)}
.modal-content{background:linear-gradient(135deg,var(--bg3),#0a0f1e);border:1px solid var(--border);border-radius:24px;padding:40px;max-width:600px;width:100%;position:relative;transform:translateY(40px) scale(0.95);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);max-height:90vh;overflow-y:auto;text-align:center}
.modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--glass);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.3s ease}
.modal-close:hover{border-color:var(--pink);color:var(--pink)}
.cert-main-view img{width:100%;border-radius:12px;margin-bottom:20px;border:1px solid var(--border);cursor:pointer}
.modal-icon{margin-bottom:12px}
.modal-content h3{font-size:20px;font-weight:800;margin-bottom:12px}
.modal-content p{color:var(--text2);font-size:14px;line-height:1.7}

/* SERVICES */
#services{padding:100px 0}
.services-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:24px}
.service-card{background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:32px 28px;transition:all 0.4s ease;position:relative;overflow:hidden}
.service-card::before{content:'';position:absolute;top:-60px;right:-60px;width:160px;height:160px;border-radius:50%;opacity:0;transition:opacity 0.4s ease}
.service-card:hover{transform:translateY(-8px)}
.service-card:hover::before{opacity:1}
.service-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:20px}
.si-blue{background:rgba(14,165,233,0.12);color:var(--blue);border:1px solid rgba(14,165,233,0.25)}
.si-purple{background:rgba(168,85,247,0.12);color:var(--purple);border:1px solid rgba(168,85,247,0.25)}
.si-pink{background:rgba(236,72,153,0.12);color:var(--pink);border:1px solid rgba(236,72,153,0.25)}
.si-green{background:rgba(16,185,129,0.12);color:var(--green);border:1px solid rgba(16,185,129,0.25)}
.si-cyan{background:rgba(6,182,212,0.12);color:var(--cyan);border:1px solid rgba(6,182,212,0.25)}
.service-card:nth-child(1):hover{border-color:rgba(14,165,233,0.4);box-shadow:0 20px 60px rgba(14,165,233,0.15)}
.service-card:nth-child(2):hover{border-color:rgba(168,85,247,0.4);box-shadow:0 20px 60px rgba(168,85,247,0.15)}
.service-card:nth-child(3):hover{border-color:rgba(236,72,153,0.4);box-shadow:0 20px 60px rgba(236,72,153,0.15)}
.service-card:nth-child(4):hover{border-color:rgba(16,185,129,0.4);box-shadow:0 20px 60px rgba(16,185,129,0.15)}
.service-card:nth-child(5):hover{border-color:rgba(6,182,212,0.4);box-shadow:0 20px 60px rgba(6,182,212,0.15)}
.service-card h3{font-size:18px;font-weight:700;margin-bottom:12px}
.service-card p{font-size:13px;color:var(--text2);line-height:1.7}

/* SOCIAL */
#social{padding:80px 0}
.social-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center}
.social-card{display:flex;align-items:center;gap:12px;padding:14px 24px;border-radius:14px;text-decoration:none;font-weight:700;font-size:14px;transition:all 0.3s ease;border:1px solid transparent}
.sc-wa{background:rgba(37,211,102,0.1);color:#25d366;border-color:rgba(37,211,102,0.2)}
.sc-wa:hover{background:rgba(37,211,102,0.2);box-shadow:0 0 20px rgba(37,211,102,0.3);transform:translateY(-3px)}
.sc-fb{background:rgba(24,119,242,0.1);color:#1877f2;border-color:rgba(24,119,242,0.2)}
.sc-fb:hover{background:rgba(24,119,242,0.2);box-shadow:0 0 20px rgba(24,119,242,0.3);transform:translateY(-3px)}
.sc-ig{background:rgba(228,64,95,0.1);color:#e4405f;border-color:rgba(228,64,95,0.2)}
.sc-ig:hover{background:rgba(228,64,95,0.2);box-shadow:0 0 20px rgba(228,64,95,0.3);transform:translateY(-3px)}
.sc-li{background:rgba(10,102,194,0.1);color:#0a66c2;border-color:rgba(10,102,194,0.2)}
.sc-li:hover{background:rgba(10,102,194,0.2);box-shadow:0 0 20px rgba(10,102,194,0.3);transform:translateY(-3px)}
.sc-yt{background:rgba(255,0,0,0.1);color:#ff0000;border-color:rgba(255,0,0,0.2)}
.sc-yt:hover{background:rgba(255,0,0,0.2);box-shadow:0 0 20px rgba(255,0,0,0.3);transform:translateY(-3px)}
.sc-gh{background:rgba(255,255,255,0.06);color:var(--text);border-color:rgba(255,255,255,0.1)}
.sc-gh:hover{background:rgba(255,255,255,0.12);box-shadow:0 0 20px rgba(255,255,255,0.1);transform:translateY(-3px)}

/* CONTACT */
#contact{padding:100px 0}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}
.contact-info h3{font-size:clamp(20px,2.5vw,28px);font-weight:800;margin-bottom:16px;background:linear-gradient(135deg,var(--text),var(--blue));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.contact-info p{color:var(--text2);line-height:1.8;font-size:15px;margin-bottom:28px}
.contact-items{display:flex;flex-direction:column;gap:12px}
.contact-item{display:flex;align-items:center;gap:16px;padding:14px 18px;background:var(--glass);border:1px solid var(--border);border-radius:14px;text-decoration:none;color:var(--text);transition:all 0.3s ease}
.contact-item:hover{border-color:rgba(14,165,233,0.3);background:rgba(14,165,233,0.05);transform:translateX(4px)}
.ci-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ci-wa{background:rgba(37,211,102,0.1);color:#25d366;border:1px solid rgba(37,211,102,0.2)}
.ci-mail{background:rgba(14,165,233,0.1);color:var(--blue);border:1px solid rgba(14,165,233,0.2)}
.ci-text .lbl{font-size:11px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px}
.ci-text .val{font-size:14px;font-weight:600;color:var(--text)}
.contact-form{background:var(--glass);border:1px solid var(--border);border-radius:24px;padding:36px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)}
.form-input{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--text);font-family:var(--font);font-size:14px;transition:all 0.3s ease;resize:none}
.form-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(14,165,233,0.1)}
.form-input::placeholder{color:var(--text3)}
textarea.form-input{min-height:130px}
.send-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:var(--font);transition:all 0.3s ease;letter-spacing:0.5px}
.send-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(14,165,233,0.35)}

/* FOOTER */
footer{border-top:1px solid rgba(14,165,233,0.08);padding:40px 5%;position:relative;z-index:2}
.footer-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:24px}
.footer-logo{font-family:var(--mono);font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--purple));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.footer-links{display:flex;gap:20px}
.footer-links a{color:var(--text3);text-decoration:none;font-size:13px;transition:color 0.3s ease;cursor:pointer}
.footer-links a:hover{color:var(--cyan)}
.footer-social{display:flex;gap:12px}
.footer-social a{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--glass);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:14px;text-decoration:none;transition:all 0.3s ease}
.footer-social a:hover{border-color:var(--blue);color:var(--blue);box-shadow:var(--glow-blue)}
.footer-bottom{text-align:center;color:var(--text3);font-size:12px;padding-top:24px;max-width:1200px;margin:0 auto}

/* BACK TO TOP */
#back-to-top{position:fixed;bottom:30px;right:30px;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;color:#fff;font-size:16px;cursor:pointer;z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(20px);transition:all 0.4s ease;box-shadow:0 4px 20px rgba(14,165,233,0.4)}
#back-to-top.show{opacity:1;transform:translateY(0)}
#back-to-top:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(14,165,233,0.6)}

/* ORBS */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(14,165,233,0.06),transparent 70%);top:10%;left:-10%;animation:orb-move-1 20s ease-in-out infinite}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(168,85,247,0.06),transparent 70%);top:50%;right:-10%;animation:orb-move-2 25s ease-in-out infinite}
.orb-3{width:300px;height:300px;background:radial-gradient(circle,rgba(236,72,153,0.05),transparent 70%);bottom:10%;left:30%;animation:orb-move-3 18s ease-in-out infinite}
@keyframes orb-move-1{0%,100%{transform:translate(0,0)}33%{transform:translate(60px,40px)}66%{transform:translate(-40px,80px)}}
@keyframes orb-move-2{0%,100%{transform:translate(0,0)}33%{transform:translate(-80px,60px)}66%{transform:translate(40px,-50px)}}
@keyframes orb-move-3{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-60px)}}

/* REVEAL ANIMATIONS */
.reveal{opacity:0;transform:translateY(30px);transition:opacity 0.7s ease,transform 0.7s ease}
.reveal.left{transform:translateX(-30px)}
.reveal.right{transform:translateX(30px)}
.reveal.visible{opacity:1;transform:translate(0,0)}
.delay-1{transition-delay:0.1s}
.delay-2{transition-delay:0.2s}
.delay-3{transition-delay:0.3s}
.delay-4{transition-delay:0.4s}
.delay-5{transition-delay:0.5s}

/* LIGHT MODE */
body.light-mode{--bg:#f0f4ff;--bg2:#e8eef9;--bg3:#dce6f5;--text:#1e293b;--text2:#475569;--text3:#94a3b8;--glass:rgba(14,165,233,0.04);--glass2:rgba(168,85,247,0.06);--border:rgba(14,165,233,0.18)}

/* SECTION ENTRY ANIMATION */
.section-fade-in{animation:sectionIn 0.6s ease both}
@keyframes sectionIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* TOOLTIP */
.tooltip-wrap{position:relative}
.tooltip-wrap:hover .tooltip-text{opacity:1;transform:translateY(0)}
.tooltip-text{position:absolute;bottom:110%;left:50%;transform:translate(-50%,4px);background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:6px;font-size:11px;color:var(--cyan);white-space:nowrap;opacity:0;transition:all 0.2s ease;pointer-events:none;z-index:10}

/* ACTIVE NAV INDICATOR */
.nav-links a.active{color:var(--cyan)}

/* MAP BOX */
.map-box{margin-top:15px;border-radius:12px;overflow:hidden;border:1px solid rgba(168,85,247,0.3);box-shadow:0 10px 30px rgba(0,0,0,0.4)}
.map-box iframe{display:block}

/* FORM STATUS */
#form-status{text-align:center;margin-top:14px;font-size:13px;display:none}

/* RESPONSIVE */
@media(max-width:900px){
  .hero-inner{grid-template-columns:1fr;gap:40px;text-align:center}
  .hero-visual{display:flex;justify-content:center;order:-1}
  .about-grid{grid-template-columns:1fr}
  .contact-grid{grid-template-columns:1fr}
  .achievement-card.featured{grid-column:span 1}
  .nav-links{display:none}
  .hamburger{display:flex}
  .hero-stats{justify-content:center}
  .hero-btns{justify-content:center}
  .hero-badge{margin:0 auto 20px}
  .hero-img-ring{width:200px;height:200px}
  
}
@media(max-width:600px){
  .projects-grid{grid-template-columns:1fr}
  .certs-grid{grid-template-columns:1fr}
  .achievements-grid{grid-template-columns:1fr}
}

</style>

// ── PAGE TRANSITION HOOK ──
function usePageTransition() {
  const [transitioning, setTransitioning] = useState(false);
  const [phase, setPhase] = useState(''); // 'entering' | 'exiting' | ''

  const triggerTransition = useCallback((callback) => {
    setPhase('entering');
    setTransitioning(true);
    setTimeout(() => {
      if (callback) callback();
      setTimeout(() => {
        setPhase('exiting');
        setTimeout(() => {
          setTransitioning(false);
          setPhase('');
        }, 700);
      }, 400);
    }, 600);
  }, []);

  return { phase, triggerTransition };
}

// ── COUNTER COMPONENT ──
function Counter({ target }) {
  const [count, setCount] = useState(0);
  const ref = useRef();
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        let cur = 0;
        const step = Math.ceil(target / 40);
        const t = setInterval(() => {
          cur = Math.min(cur + step, target);
          setCount(cur);
          if (cur >= target) clearInterval(t);
        }, 50);
        obs.disconnect();
      }
    }, { threshold: 0.5 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [target]);
  return <span ref={ref} className="num">{count}{target > 20 ? '+' : ''}</span>;
}

// ── TYPING COMPONENT ──
function TypingText() {
  const phrases = ['Software Engineer','Full Stack Developer','Creative Web Designer','UI-Focused Problem Solver','Python & JS Developer'];
  const [text, setText] = useState('');
  const [pi, setPi] = useState(0);
  const [ci, setCi] = useState(0);
  const [deleting, setDeleting] = useState(false);
  const [wait, setWait] = useState(0);

  useEffect(() => {
    const timer = setTimeout(() => {
      if (wait > 0) { setWait(w => w - 1); return; }
      const phrase = phrases[pi];
      if (!deleting) {
        setText(phrase.substring(0, ci + 1));
        if (ci + 1 === phrase.length) { setDeleting(true); setWait(25); }
        else setCi(c => c + 1);
      } else {
        setText(phrase.substring(0, ci - 1));
        if (ci - 1 === 0) { setDeleting(false); setPi(p => (p + 1) % phrases.length); }
        setCi(c => c - 1);
      }
    }, deleting ? 45 : wait > 0 ? 80 : 80);
    return () => clearTimeout(timer);
  }, [text, pi, ci, deleting, wait]);

  return (
    <div className="hero-role">
      <span className="typed-text">{text}</span>
      <span className="cursor-blink">|</span>
    </div>
  );
}

// ── REVEAL WRAPPER ──
function Reveal({ children, className = '', delay = '' }) {
  const ref = useRef();
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} className={`reveal ${className} ${delay} ${visible ? 'visible' : ''}`}>
      {children}
    </div>
  );
}

// ── SKILL PROGRESS BAR ──
function SkillBar({ label, pct }) {
  const ref = useRef();
  const [animated, setAnimated] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setAnimated(true); obs.disconnect(); }
    }, { threshold: 0.5 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div className="sp-row" ref={ref}>
      <div className="sp-label"><span>{label}</span><span>{pct}%</span></div>
      <div className="sp-bar">
        <div className="sp-fill" style={{ width: animated ? `${pct}%` : '0%', transition: 'width 1.2s ease' }}></div>
      </div>
    </div>
  );
}
